apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: flipkart

spec:
  replicas: 2

  selector:
    matchLabels:
      app: product-service

  template:
    metadata:
      labels:
        app: product-service

    spec:
      containers:
      - name: product-service
        image: ayrus21/product-service:v1

        ports:
        - containerPort: 5000
